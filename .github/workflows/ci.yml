name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-static-checks:
    name: Repo Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run static repo checks
        run: ./scripts/check-repo-static.sh

  foundation-extension-compile:
    name: Foundation Extension Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Compile foundation runtime extensions
        run: ./scripts/check-foundation-extension-compile.sh

  extension-unit-tests:
    name: Extension Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run extension unit-test validator
        run: ./scripts/validate-extension-unit-tests.sh

  routing-validators:
    name: Routing Validators
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run queue-semantics validator
        run: ./scripts/validate-queue-semantics.sh

      - name: Run skill-routing validator
        run: ./scripts/validate-skill-routing.sh --skip-live

      - name: Run harness-routing validator
        run: ./scripts/validate-harness-routing.sh

      - name: Run team-activation validator
        run: ./scripts/validate-team-activation.sh

      - name: Run task-packets validator
        run: ./scripts/validate-task-packets.sh

      - name: Run handoffs validator
        run: ./scripts/validate-handoffs.sh

      - name: Run same-runtime bridge validator
        run: ./scripts/validate-same-runtime-bridge.sh
